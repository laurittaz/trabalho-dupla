<!DOCTYPE html>
<html>
<head>
<meta charset="UFT-8">
<title>Meu Formulário</title>
</head>
<body>
<h1>Contato</h1>
<p>Preencha o formulário para enviar a mensagem</p>
<!--
	FORM:
		-action:para onde os dados serão enviados (URL do Servidor)
		-method:
			GET -> envia pela URL (não recomendo para mensagens/senhas)
			POST -> envia dados no corpo da requisição(mais comum)
		-->
		
<form action="#" method="post">
Nome: <input type="text" name="nome" placeholder="Digite seu nome" maxlength="30" required>
<br><br>
E-mail: <input type="text" name="email" placeholder="Digite um e-mail" maxlength="30" required>
<br><br>
Assunto:
<br>
<select>
<option value="">Selecione </option>
<option value="duvida">Duvida</option>
<option value="sugestao">Sugestão</option>
<option value="elogio">Elogio</option>
<option value="outro">Outro</option>
</select>

<br><br>
Aceita receber novidades?
<input type="checkbox" name="novidades" value="sim">
<br><br>

Como você prefere ser contatado?
<br>
<input type="radio" name="preferenciacontato" value="email" checked>
E-mail:
<br>
